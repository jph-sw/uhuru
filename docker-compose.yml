services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/data
    environment:
      PORT: 3000
      BETTER_AUTH_SECRET: changeme-min-32-characters-long!!
      BETTER_AUTH_URL: http://localhost:3000
      ADMIN_NAME: Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme

volumes:
  app-data:
